services:
  - type: web
    name: activityhub
    runtime: python
    runtimeVersion: "3.11"
    
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    
    startCommand: gunicorn social_hub.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "yourdomain.onrender.com,www.yourdomain.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: activityhub-db
          property: connectionString
      - key: ENVIRONMENT
        value: "production"
  
  - type: pserv
    name: activityhub-db
    ipWhitelist: []
    plan: free
    postgresSqlVersion: "15"
