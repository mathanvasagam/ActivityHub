{% extends 'base.html' %}

{% block title %}Delete Blog | ActivityHub{% endblock %}

{% block content %}
<section class="panel reveal">
    <p class="eyebrow">Delete</p>
    <h1>Delete this blog entry?</h1>
    <p>This action cannot be undone.</p>
    <p><strong>{{ blog.title }}</strong></p>

    <form method="post" class="section-row">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">Yes, delete</button>
        <a href="{% url 'searcher:blogs' %}" class="btn btn-secondary">Cancel</a>
    </form>
</section>
{% endblock %}
